
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="origin" />
    <title>Work Order Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Open+Sans:wght@300;400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Default Theme (Indigo) - Initial values to prevent flash */
        --c-50: 238 242 255;
        --c-100: 224 231 255;
        --c-200: 199 210 254;
        --c-300: 165 180 252;
        --c-400: 129 140 248;
        --c-500: 99 102 241;
        --c-600: 79 70 229;
        --c-700: 67 56 202;
        --c-800: 55 48 163;
        --c-900: 49 46 129;
        --c-950: 30 27 75;
        --font-main: 'Inter';
      }

      body {
        font-family: var(--font-main), sans-serif;
        margin: 0;
        padding: 0;
        overflow: hidden; /* Prevent body scroll, handle in App */
        background-color: #f3f4f6; /* Static fallback */
      }

      /* Optimized Mesh Gradient Background (Static) */
      .mesh-bg {
        background-color: #f3f4f6;
        background-image: 
          radial-gradient(at 0% 0%, hsla(253,16%,7%,0.05) 0, transparent 50%), 
          radial-gradient(at 50% 0%, rgb(var(--c-100)) 0, transparent 50%), 
          radial-gradient(at 100% 0%, rgb(var(--c-50)) 0, transparent 50%);
        background-size: cover;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
      }

      /* Optimized Glass Effect (No Backdrop Filter) */
      .glass-panel {
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(229, 231, 235, 0.8);
      }

      .glass-header {
        background: rgba(255, 255, 255, 0.98);
        border-bottom: 1px solid rgba(229, 231, 235, 1);
      }

      /* Modern Scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        height: 8px;
        width: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.05);
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(0,0,0,0.2);
        border-radius: 4px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background-color: rgb(var(--c-500)); 
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div class="mesh-bg"></div>
    <div id="root"></div>
    <script>
      (function() {
        try {
          var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && descriptor.get && !descriptor.set) {
            // It's a getter-only property. Redefine it with a setter to intercept assignments.
            Object.defineProperty(window, 'fetch', {
              get: descriptor.get,
              set: function(val) {
                console.warn("Intercepted attempt to overwrite fetch. Ignoring assignment.");
              },
              configurable: true
            });
          }
        } catch (e) {
          console.warn("Could not intercept fetch assignment:", e);
        }
      })();
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
